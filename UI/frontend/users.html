<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Users | FCPC Attendance Tracker</title>
  <script>
    if (localStorage.getItem('sidebar-collapsed') === '1') {
      document.documentElement.classList.add('sidebar-collapsed');
    }
  </script>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>

<!-- Page Transition Overlay -->
<div class="page-transition-overlay" id="pageTransitionOverlay"></div>

<div class="dashboard-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <!-- User Info -->
    <div class="sidebar-user">
      <div class="sidebar-avatar">
        <img src="images/default-logo.png" alt="Default Logo" />
      </div>
      <div class="sidebar-user-info">
        <h3>User, Test</h3>
        <p>Administrator</p>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="sidebar-nav">
      <a href="users.html" class="active">
        <!-- Users icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
        </svg>
        Users
      </a>
      <a href="students.html">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6L21 9l-9-6zm0 4.2L17.53 10 12 12.8 6.47 10 12 7.2zM7 12.7l5 2.73 5-2.73v3.16L12 18.6l-5-2.74v-3.16z"/>
        </svg>
        Students
      </a>
      <a href="employee.html">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v3h16v-3c0-2.66-5.33-4-8-4zm8-4h2v2h-2v2h-2v-2h-2v-2h2V8h2v2z"/>
        </svg>
        Employees
      </a>
      <a href="attendance.html">
        <!-- Attendance / list icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/>
        </svg>
        Attendance
      </a>
    </nav>

    <!-- Logout -->
    <div class="sidebar-logout">
      <button class="btn-logout" onclick="handleLogout()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Log out
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-content">

    <!-- Top Header -->
    <header class="top-header">
      <button class="menu-toggle" onclick="toggleSidebar()" aria-label="Toggle menu">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      <!-- FCPC Logo top-right -->
      <div class="header-logo">
        <img src="images/fcpc-logo.png" alt="FCPC Logo" height="36" />
      </div>
    </header>

    <!-- Page Content -->
    <main class="page-content">
      <h1 class="page-title">Users</h1>
      <hr class="page-divider" />

      <!-- Filters and Add User Row -->
      <div class="filters-row" style="display: flex; justify-content: space-between; align-items: flex-end; gap: 20px; margin-bottom: 24px;">
        <div style="display: flex; gap: 20px; align-items: flex-end;">
          <div class="filter-group">
            <label for="searchInput">Search</label>
            <input
              type="text"
              id="searchInput"
              class="filter-input"
              placeholder="Search by Name/ID"
            />
          </div>

          <div class="filter-group">
            <label for="typeSelect">Role</label>
            <select id="typeSelect" class="filter-select">
              <option value="all">All</option>
              <option value="Admin">Admin</option>
              <option value="Superadmin">Superadmin</option>
            </select>
          </div>

          <div class="filter-group">
            <label for="dateInput">Date</label>
            <input
              type="date"
              id="dateInput"
              class="filter-input"
              placeholder="MM/DD/YYYY"
            />
          </div>
        </div>

        <!-- Add User Button -->
        <button id="addUserBtn" class="btn-add" onclick="openAddUserModal()" style="background-color: #1a237e; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; white-space: nowrap;">
          + Add User
        </button>
      </div>

      <!-- Table -->
      <div class="table-wrapper">
        <div class="table-skeleton" style="display:none;">
          <div class="skeleton-row"></div>
          <div class="skeleton-row"></div>
          <div class="skeleton-row"></div>
          <div class="skeleton-row"></div>
          <div class="skeleton-row"></div>
          <div class="skeleton-row"></div>
          <div class="skeleton-row"></div>
          <div class="skeleton-row"></div>
          <div class="skeleton-row"></div>
        </div>
        <table class="data-table" data-endpoint="../backend/api/users.php" data-table-type="users">
          <thead>
            <tr>
              <th>ID</th>
              <th>Username</th>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
              <th>Status</th>
              <th>Created At</th>
              <th>Updated At</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="pagination">
        <button class="pg-btn" id="prevBtn" aria-label="Previous page" onclick="prevPage()">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </button>
        <div id="pageNumbers"></div>
        <button class="pg-btn" id="nextBtn" aria-label="Next page" onclick="nextPage()">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </button>
      </div>
    </main>

  </div><!-- end main-content -->
</div><!-- end dashboard-layout -->

<!-- Logout Modal -->
<div id="logoutModal" class="modal">
  <div class="modal-overlay"></div>
  <div class="modal-content">
    <h2 class="modal-title">This page says</h2>
    <p class="modal-message">Are you sure you want to log out?</p>
    <div class="modal-buttons">
      <button id="logoutConfirm" class="modal-btn modal-btn-confirm">OK</button>
      <button id="logoutCancel" class="modal-btn modal-btn-cancel">Cancel</button>
    </div>
  </div>
</div>

<!-- Add User Modal -->
<div id="addUserModal" class="modal">
  <div class="modal-overlay" onclick="closeAddUserModal()"></div>
  <div class="modal-content overview-modal-content">
    <div class="overview-header">Add New User</div>
    <div class="overview-grid">
      <div class="overview-field">
        <label for="username">Username:</label>
        <input id="username" type="text" name="username" class="edit-input-active" placeholder="Username" />
      </div>
      <div class="overview-field">
        <label for="first_name">First Name:</label>
        <input id="first_name" type="text" name="first_name" class="edit-input-active" placeholder="First name" />
      </div>
      <div class="overview-field">
        <label for="middle_name">Middle Name:</label>
        <input id="middle_name" type="text" name="middle_name" class="edit-input-active" placeholder="Middle name" />
      </div>
      <div class="overview-field">
        <label for="last_name">Last Name:</label>
        <input id="last_name" type="text" name="last_name" class="edit-input-active" placeholder="Last name" />
      </div>
      <div class="overview-field">
        <label for="email">Email:</label>
        <input id="email" type="email" name="email" class="edit-input-active" placeholder="email@fcpc.edu.ph" />
      </div>
      <div class="overview-field">
        <label for="role">Role:</label>
        <select id="role" name="role" class="edit-input-active overview-select">
          <option value="">Select Role</option>
          <option value="Admin">Admin</option>
          <option value="Superadmin">Super Admin</option>
        </select>
      </div>
      <div class="overview-field">
        <label for="status">Status:</label>
        <select id="status" name="status" class="edit-input-active overview-select">
          <option value="Active">Active</option>
          <option value="Inactive">Inactive</option>
        </select>
      </div>
    </div>
    <div class="overview-divider"></div>
    <div class="overview-actions">
      <button type="button" class="overview-back-btn overview-cancel-btn" onclick="closeAddUserModal()">Cancel</button>
      <button type="button" class="overview-back-btn" onclick="saveAddUser()">Add User</button>
    </div>
  </div>
</div>

<!-- View User Modal -->
<div id="viewUserModal" class="modal">
  <div class="modal-overlay"></div>
  <div class="modal-content overview-modal-content">
    <div class="overview-header">Information Overview</div>
    <div class="overview-grid">
      <div class="overview-field">
        <label for="viewUserUsername">Username:</label>
        <input id="viewUserUsername" type="text" readonly />
      </div>
      <div class="overview-field">
        <label for="viewUserFirstName">First Name:</label>
        <input id="viewUserFirstName" type="text" readonly />
      </div>
      <div class="overview-field">
        <label for="viewUserMiddleName">Middle Name:</label>
        <input id="viewUserMiddleName" type="text" readonly />
      </div>
      <div class="overview-field">
        <label for="viewUserLastName">Last Name:</label>
        <input id="viewUserLastName" type="text" readonly />
      </div>
      <div class="overview-field overview-field-full">
        <label for="viewUserEmail">Email:</label>
        <input id="viewUserEmail" type="text" readonly />
      </div>
      <div class="overview-field">
        <label for="viewUserRole">Role:</label>
        <input id="viewUserRole" type="text" readonly />
      </div>
      <div class="overview-field">
        <label for="viewUserStatus">Status:</label>
        <input id="viewUserStatus" type="text" readonly />
      </div>
    </div>
    <div class="overview-divider"></div>
    <div class="overview-meta-row">
      <div>
        <span>Created At:</span>
        <strong id="viewUserCreatedAt">-</strong>
      </div>
      <div>
        <span>Updated At:</span>
        <strong id="viewUserUpdatedAt">-</strong>
      </div>
    </div>
    <div class="overview-actions">
      <button type="button" class="overview-back-btn" onclick="closeViewUserModal()">Back</button>
    </div>
  </div>
</div>

<!-- Edit User Modal -->
<div id="editUserModal" class="modal">
  <div class="modal-overlay" onclick="closeEditUserModal()"></div>
  <div class="modal-content overview-modal-content">
    <div class="overview-header">Edit User</div>
    <div class="overview-grid">
      <div class="overview-field">
        <label for="editUserUsername">Username:</label>
        <input id="editUserUsername" type="text" class="edit-input-active" />
      </div>
      <div class="overview-field">
        <label for="editUserFirstName">First Name:</label>
        <input id="editUserFirstName" type="text" class="edit-input-active" />
      </div>
      <div class="overview-field">
        <label for="editUserMiddleName">Middle Name:</label>
        <input id="editUserMiddleName" type="text" class="edit-input-active" />
      </div>
      <div class="overview-field">
        <label for="editUserLastName">Last Name:</label>
        <input id="editUserLastName" type="text" class="edit-input-active" />
      </div>
      <div class="overview-field overview-field-full">
        <label for="editUserEmail">Email:</label>
        <input id="editUserEmail" type="text" class="edit-input-active" />
      </div>
      <div class="overview-field">
        <label for="editUserRole">Role:</label>
        <select id="editUserRole" class="edit-input-active overview-select">
          <option value="">Select Role</option>
          <option value="Admin">Admin</option>
          <option value="Superadmin">Super Admin</option>
        </select>
      </div>
      <div class="overview-field">
        <label for="editUserStatus">Status:</label>
        <select id="editUserStatus" class="edit-input-active overview-select">
          <option value="Active">Active</option>
          <option value="Inactive">Inactive</option>
        </select>
      </div>
    </div>
    <div class="overview-divider"></div>
    <div class="overview-actions">
      <button type="button" class="overview-back-btn overview-cancel-btn" onclick="closeEditUserModal()">Cancel</button>
      <button type="button" class="overview-back-btn" onclick="saveEditUser()">Save</button>
    </div>
  </div>
</div>

<div id="appToast" class="app-toast"></div>

<script src="assets/js/script.js"></script>
</body>
</html>
